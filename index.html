<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AER 流媒体合租上车页面" />
    <title>AER 流媒体合租</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/gsap@3/dist/gsap.min.js"></script>
    <script src="assets.js"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["ui-sans-serif", "system-ui", "-apple-system", "BlinkMacSystemFont", "Segoe UI", "sans-serif"]
            },
            boxShadow: {
              soft: "0 18px 50px rgba(15, 23, 42, 0.08)"
            }
          }
        }
      };
    </script>
    <style>
      :root {
        color-scheme: light;
        --ring: 222.2 84% 4.9%;
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        min-height: 100dvh;
        margin: 0;
        background: #ffffff;
        color: #0f172a;
        -webkit-font-smoothing: antialiased;
        text-rendering: geometricPrecision;
      }

      button,
      a {
        -webkit-tap-highlight-color: transparent;
      }

      .no-scrollbar {
        scrollbar-width: none;
      }

      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }

      .brand-card {
        background:
          radial-gradient(circle at 18% 12%, color-mix(in srgb, var(--brand) 16%, white), transparent 34%),
          linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
      }

      .slide-panel {
        background:
          radial-gradient(circle at 78% 18%, color-mix(in srgb, var(--tone) 20%, white), transparent 32%),
          linear-gradient(135deg, #ffffff 0%, #f8fafc 56%, #ffffff 100%);
      }

      .focus-ring:focus-visible {
        outline: 2px solid #0f172a;
        outline-offset: 3px;
      }

      .action-grid {
        display: grid;
        grid-template-columns: minmax(0, 1.08fr) minmax(0, 0.92fr);
        grid-template-rows: repeat(2, minmax(58px, auto));
        gap: 8px;
      }

      .action-primary {
        grid-row: 1 / span 2;
      }

      .action-card {
        overflow: hidden;
        position: relative;
      }

      @media (max-width: 639px) {
        #secondaryActionA,
        #secondaryActionB {
          align-content: center;
          display: grid;
          grid-template-columns: minmax(0, 1fr) 28px;
          grid-template-rows: auto auto;
          justify-content: stretch;
        }

        #secondaryActionA > span:first-child,
        #secondaryActionB > span:first-child {
          grid-column: 1;
          grid-row: 1;
        }

        #secondaryActionA > span:nth-child(2),
        #secondaryActionB > span:nth-child(2) {
          grid-column: 1;
          grid-row: 2;
        }

        #secondaryActionA > span:last-child,
        #secondaryActionB > span:last-child {
          grid-column: 2;
          grid-row: 1 / span 2;
          justify-self: end;
          margin: 0;
        }
      }

      @media (min-width: 768px) {
        .action-grid {
          grid-template-columns: minmax(0, 1.15fr) minmax(0, 0.85fr);
          grid-template-rows: repeat(2, minmax(118px, auto));
          gap: 12px;
        }
      }
    </style>
  </head>
  <body class="font-sans">
    <main class="mx-auto flex w-full max-w-6xl flex-col gap-7 px-4 py-5 sm:px-6 sm:py-8 lg:px-8">
      <section class="hero-section overflow-hidden rounded-[22px] border border-slate-200 bg-white shadow-soft">
        <div class="relative">
          <div id="carousel" class="relative min-h-[310px] sm:min-h-[380px]"></div>

          <div class="absolute bottom-4 left-4 right-4 flex items-center justify-between gap-3 sm:bottom-6 sm:left-6 sm:right-6">
            <div id="dots" class="flex gap-2"></div>
            <div class="flex items-center gap-2">
              <button
                id="prevSlide"
                class="focus-ring grid h-10 w-10 place-items-center rounded-full border border-slate-200 bg-white/85 text-lg text-slate-900 shadow-sm backdrop-blur transition hover:bg-slate-50"
                type="button"
                aria-label="上一张"
              >
                ‹
              </button>
              <button
                id="nextSlide"
                class="focus-ring grid h-10 w-10 place-items-center rounded-full border border-slate-200 bg-white/85 text-lg text-slate-900 shadow-sm backdrop-blur transition hover:bg-slate-50"
                type="button"
                aria-label="下一张"
              >
                ›
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="action-grid">
        <button
          id="primaryAction"
          class="action-card action-primary focus-ring group flex min-h-[124px] flex-col justify-between rounded-[18px] border border-slate-900 bg-slate-950 p-4 text-left text-white shadow-soft transition hover:-translate-y-0.5 hover:bg-slate-900 sm:min-h-[236px] sm:rounded-[22px] sm:p-5 md:min-h-[250px] md:p-7"
          type="button"
        ></button>
        <button
          id="secondaryActionA"
          class="action-card focus-ring group flex min-h-[58px] flex-col justify-between rounded-[18px] border border-slate-200 bg-white p-3 text-left shadow-sm transition hover:-translate-y-0.5 hover:border-slate-300 hover:shadow-soft sm:min-h-[112px] sm:rounded-[22px] sm:p-5"
          type="button"
        ></button>
        <button
          id="secondaryActionB"
          class="action-card focus-ring group flex min-h-[58px] flex-col justify-between rounded-[18px] border border-slate-200 bg-white p-3 text-left shadow-sm transition hover:-translate-y-0.5 hover:border-slate-300 hover:shadow-soft sm:min-h-[112px] sm:rounded-[22px] sm:p-5"
          type="button"
        ></button>
      </section>

      <section class="product-section flex flex-col gap-5 pb-8">
        <div class="flex items-end justify-between gap-4">
          <div>
            <p class="text-sm font-medium text-slate-500">可上车平台</p>
            <h1 class="mt-1 text-2xl font-semibold tracking-normal text-slate-950 sm:text-3xl">选择一个空位加入车队</h1>
          </div>
        </div>
        <div id="productRows" class="flex flex-col gap-6"></div>
      </section>
    </main>

    <script>
      const assets = window.AER_ASSETS;
      const carousel = document.querySelector("#carousel");
      const dots = document.querySelector("#dots");
      const productRows = document.querySelector("#productRows");
      let activeSlide = 0;
      let slideTimer;

      function renderSlides() {
        carousel.innerHTML = assets.slides
          .map(
            (slide, index) => `
              <article
                class="slide-panel absolute inset-0 flex flex-col justify-between p-6 sm:p-8 lg:p-10 ${index === 0 ? "" : "pointer-events-none opacity-0"}"
                style="--tone: ${slide.tone}"
                data-slide="${index}"
              >
                <div class="flex items-center justify-between gap-4">
                  <span class="rounded-full border border-slate-200 bg-white px-3 py-1 text-sm font-medium text-slate-700">${slide.badge}</span>
                  <span class="rounded-full border border-slate-200 bg-white px-3 py-1 text-sm text-slate-500">5人车队</span>
                </div>
                <div class="grid gap-6 sm:grid-cols-[1fr_0.78fr] sm:items-end">
                  <div>
                    <div class="mb-4 inline-flex items-center gap-2 rounded-2xl border border-slate-200 bg-white p-2 pr-4 shadow-sm">
                      <span class="grid h-10 w-10 place-items-center rounded-xl text-lg font-black text-white" style="background:${slide.tone}">${slide.brand.charAt(0)}</span>
                      <strong class="text-base text-slate-950">${slide.brand}</strong>
                    </div>
                    <h2 class="max-w-xl text-4xl font-semibold leading-tight tracking-normal text-slate-950 sm:text-5xl lg:text-6xl">${slide.title}</h2>
                    <p class="mt-4 max-w-lg text-base leading-7 text-slate-600 sm:text-lg">${slide.text}</p>
                  </div>
                  <div class="brand-orbit hidden h-44 rounded-[22px] border border-slate-200 bg-white p-4 shadow-sm sm:block">
                    <div class="flex h-full flex-col justify-between rounded-2xl border border-dashed border-slate-200 p-4">
                      <span class="text-sm font-medium text-slate-500">Seat availability</span>
                      <div class="flex items-end justify-between">
                        <span class="text-5xl font-semibold text-slate-950">2</span>
                        <span class="rounded-full px-3 py-1 text-sm font-medium text-white" style="background:${slide.tone}">空位</span>
                      </div>
                    </div>
                  </div>
                </div>
              </article>
            `
          )
          .join("");

        dots.innerHTML = assets.slides
          .map(
            (_, index) => `
              <button
                class="focus-ring h-2.5 rounded-full transition-all ${index === 0 ? "w-8 bg-slate-950" : "w-2.5 bg-slate-300"}"
                type="button"
                aria-label="切换到第 ${index + 1} 张"
                data-dot="${index}"
              ></button>
            `
          )
          .join("");
      }

      function renderActions() {
        const [primary, secondA, secondB] = assets.actions;
        const actionMarkup = (action, dark = false, compact = false) => `
          <span class="text-xs font-medium sm:text-sm ${dark ? "text-slate-300" : "text-slate-500"}">${action.kicker}</span>
          <span>
            <span class="block font-semibold leading-tight tracking-normal ${compact ? "text-lg sm:text-2xl" : "text-xl sm:text-2xl"} ${dark ? "text-white" : "text-slate-950"}">${action.label}</span>
            <span class="mt-2 hidden text-sm leading-6 sm:block ${dark ? "text-slate-300" : "text-slate-600"}">${action.text}</span>
          </span>
          <span class="${compact ? "h-7 w-7 sm:h-8 sm:w-8" : "h-8 w-8 sm:h-9 sm:w-9"} inline-flex items-center justify-center rounded-full text-sm sm:mt-4 sm:text-base ${dark ? "bg-white text-slate-950" : "bg-slate-950 text-white"} transition group-hover:translate-x-1">›</span>
        `;

        document.querySelector("#primaryAction").innerHTML = actionMarkup(primary, true);
        document.querySelector("#secondaryActionA").innerHTML = actionMarkup(secondA, false, true);
        document.querySelector("#secondaryActionB").innerHTML = actionMarkup(secondB, false, true);
      }

      function avatarStack(joined, offset) {
        return Array.from({ length: 5 })
          .map((_, index) => {
            if (index < joined) {
              const avatar = assets.avatars[(offset + index) % assets.avatars.length];
              return `<span class="grid h-10 w-10 shrink-0 place-items-center overflow-hidden rounded-full border-2 border-white bg-slate-100 shadow-sm sm:h-11 sm:w-11"><img src="${avatar}" alt="用户头像" class="h-full w-full object-cover" /></span>`;
            }

            return `<span class="grid h-10 w-10 shrink-0 place-items-center rounded-full border-2 border-dashed border-slate-300 bg-white text-lg font-medium text-slate-500 sm:h-11 sm:w-11">+</span>`;
          })
          .join("");
      }

      function renderProducts() {
        productRows.innerHTML = assets.rows
          .map(
            (row, rowIndex) => `
              <div class="product-row" style="--brand:${row.tone}">
                <div class="mb-3 flex items-center justify-between gap-3">
                  <h2 class="text-lg font-semibold tracking-normal text-slate-950">${row.title}</h2>
                </div>
                <div class="no-scrollbar flex snap-x gap-3 overflow-x-auto pb-2" data-scroll-row>
                  ${row.plans
                    .map(
                      (plan, planIndex) => `
                        <article class="brand-card product-card min-w-[82%] snap-start rounded-[22px] border border-slate-200 p-4 shadow-sm transition sm:min-w-[380px] sm:p-5 lg:min-w-[410px]" style="--brand:${row.tone}">
                          <div class="flex min-h-32 flex-col justify-between rounded-[18px] border border-slate-200 bg-white p-4">
                            <div class="flex items-center justify-between gap-3">
                              <span class="grid h-11 w-11 place-items-center rounded-2xl text-lg font-black text-white" style="background:${row.tone}">${row.brand.charAt(0)}</span>
                              <span class="rounded-full bg-slate-100 px-3 py-1 text-sm font-medium text-slate-600">${plan.price}</span>
                            </div>
                            <div>
                              <strong class="block text-2xl font-semibold tracking-normal text-slate-950">${row.brand}</strong>
                              <span class="mt-1 block text-sm text-slate-500">${plan.name}</span>
                            </div>
                          </div>
                          <div class="mt-4 flex items-center justify-between gap-4">
                            <div class="-space-x-3 flex">${avatarStack(plan.joined, rowIndex * 3 + planIndex)}</div>
                            <span class="text-sm font-medium text-slate-500">${plan.joined}/5 已上车</span>
                          </div>
                        </article>
                      `
                    )
                    .join("")}
                </div>
              </div>
            `
          )
          .join("");
      }

      function setSlide(nextIndex) {
        const slides = gsap.utils.toArray("[data-slide]");
        const dotButtons = gsap.utils.toArray("[data-dot]");
        if (nextIndex === activeSlide || !slides.length) return;

        const current = slides[activeSlide];
        const next = slides[nextIndex];
        activeSlide = nextIndex;

        dotButtons.forEach((dot, index) => {
          dot.className = `focus-ring h-2.5 rounded-full transition-all ${index === activeSlide ? "w-8 bg-slate-950" : "w-2.5 bg-slate-300"}`;
        });

        gsap.timeline()
          .to(current, { autoAlpha: 0, x: -18, duration: 0.35, ease: "power2.out" })
          .set(current, { x: 0, pointerEvents: "none" })
          .set(next, { x: 18, pointerEvents: "auto" })
          .to(next, { autoAlpha: 1, x: 0, duration: 0.45, ease: "power3.out" }, "-=0.05");
      }

      function nextSlide() {
        setSlide((activeSlide + 1) % assets.slides.length);
      }

      function previousSlide() {
        setSlide((activeSlide - 1 + assets.slides.length) % assets.slides.length);
      }

      function startCarousel() {
        window.clearInterval(slideTimer);
        slideTimer = window.setInterval(nextSlide, 4200);
      }

      function bindEvents() {
        document.querySelector("#nextSlide").addEventListener("click", () => {
          nextSlide();
          startCarousel();
        });
        document.querySelector("#prevSlide").addEventListener("click", () => {
          previousSlide();
          startCarousel();
        });
        document.querySelectorAll("[data-dot]").forEach((dot) => {
          dot.addEventListener("click", () => {
            setSlide(Number(dot.dataset.dot));
            startCarousel();
          });
        });
        document.querySelectorAll(".product-card").forEach((card) => {
          card.addEventListener("mouseenter", () => gsap.to(card, { y: -4, duration: 0.22, ease: "power2.out", overwrite: "auto" }));
          card.addEventListener("mouseleave", () => gsap.to(card, { y: 0, duration: 0.22, ease: "power2.out", overwrite: "auto" }));
        });
      }

      function animatePage() {
        if (!window.gsap) return;
        gsap.defaults({ ease: "power3.out", duration: 0.72 });
        const mm = gsap.matchMedia();

        mm.add(
          {
            reduceMotion: "(prefers-reduced-motion: reduce)",
            desktop: "(min-width: 768px)"
          },
          (context) => {
            const { reduceMotion, desktop } = context.conditions;
            if (reduceMotion) return;

            gsap.from(".hero-section", { y: 22, autoAlpha: 0, duration: 0.65 });
            gsap.from(".action-card", { y: 18, autoAlpha: 0, stagger: 0.08, delay: 0.12 });
            gsap.from(".product-row", { y: 22, autoAlpha: 0, stagger: 0.1, delay: 0.22 });
            gsap.to(".brand-orbit", {
              y: desktop ? -8 : -4,
              repeat: -1,
              yoyo: true,
              duration: 2.2,
              ease: "sine.inOut"
            });
          }
        );
      }

      renderSlides();
      renderActions();
      renderProducts();
      bindEvents();
      animatePage();
      startCarousel();
    </script>
  </body>
</html>
